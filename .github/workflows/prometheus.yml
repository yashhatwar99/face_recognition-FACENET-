name: Deploy Prometheus

on:
  push:
    branches: [ main, test_branch ]
    paths:
      - 'prometheus.yml'
      - 'Dockerfile.prometheus'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and Push
      uses: docker/build-push-action@v4
      with:
        context: .
        file: Dockerfile.prometheus
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/custom-prometheus:latest

    - name: Deploy to AWS
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.AWS_HOST }}
        username: ${{ secrets.AWS_USER }}
        key: ${{ secrets.AWS_KEY }}
        script: |
          sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/custom-prometheus:latest
          sudo docker stop prometheus || true
          sudo docker rm prometheus || true
          sudo docker run -d \
            --name prometheus \
            -p 9090:9090 \
            --add-host=host.docker.internal:host-gateway \
            ${{ secrets.DOCKERHUB_USERNAME }}/custom-prometheus:latest
