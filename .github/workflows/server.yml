name: Deploy Server

on:
  push:
    branches: [ main,test_branch ]
    paths:
      - 'server/**'
      - 'Dockerfile.server'
      - 'requirements.txt'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and Push
      uses: docker/build-push-action@v4
      with:
        context: .
        file: Dockerfile.server
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/face-api:latest

    - name: Deploy to Azure
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.AZURE_HOST }}
        username: ${{ secrets.AZURE_USER }}
        key: ${{ secrets.AZURE_KEY }}
        script: |
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/face-api:latest
          docker stop face-api || true
          docker rm face-api || true
          docker run -d --name face-api -p 3000:3000 --network host ${{ secrets.DOCKERHUB_USERNAME }}/face-api:latest