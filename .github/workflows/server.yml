name: Deploy Server

on:
  # Trigger 1: When you edit the server code directly
  push:
    branches: [ main ]
    paths:
      - 'server/**'
      - 'Dockerfile.server'
      - 'requirements.txt'
      
  # Trigger 2: When the Model Training workflow finishes
  workflow_run:
    workflows: ["Retrain Face Model"]
    types:
      - completed

jobs:
  build-and-deploy:
    # Only run if the training workflow succeeded, OR if this was a direct code push
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'push' }}
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # This pulls the face_model.pkl from the successful train workflow
    - name: Download Latest Model
      uses: dawidd6/action-download-artifact@v3
      with:
        workflow: train.yml
        branch: main
        name: trained-face-model
        if_no_artifact_found: warn
    
    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and Push Docker Image
      uses: docker/build-push-action@v4
      with:
        context: .
        file: Dockerfile.server
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/face-api:latest

    # UPDATED: Now deploying to AWS EC2 using AWS secrets
    - name: Deploy to AWS EC2
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.AWS_HOST }}
        username: ${{ secrets.AWS_USER }}
        key: ${{ secrets.AWS_KEY }}
        script: |
          sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/face-api:latest
          sudo docker stop face-api || true
          sudo docker rm face-api || true
          sudo docker run -d --name face-api -p 3000:3000 --network host ${{ secrets.DOCKERHUB_USERNAME }}/face-api:latest