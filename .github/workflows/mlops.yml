# File: .github/workflows/mlops.yml
name: Face Recognition MLOps Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-train-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Evaluation
      run: |
        python eval.py

    - name: Train Production Model
      run: |
        python train_model.py

    - name: Upload Model Artifact
      uses: actions/upload-artifact@v3
      with:
        name: trained-face-model
        path: face_model.pkl

    # --- NEW DOCKER STEPS ---
    - name: Login to Docker Hub
      if: github.event_name == 'push' # Only push image if merged to main
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and Push Docker Image
      if: github.event_name == 'push'
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/face-recognition:latest

    - name: Deploy to Azure VM
      if: github.event_name == 'push'
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.AZURE_HOST }}
        username: ${{ secrets.AZURE_USER }}
        key: ${{ secrets.AZURE_KEY }}
        script: |
          # 1. Pull the new image from DockerHub
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/face-recognition:latest
          
          # 2. Stop and remove the old running container (if it exists)
          docker stop face-api || true
          docker rm face-api || true
          
          # 3. Run the new container on port 8000
          docker run -d --name face-api -p 8000:8000 ${{ secrets.DOCKERHUB_USERNAME }}/face-recognition:latest