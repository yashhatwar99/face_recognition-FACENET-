name: Face Recognition MLOps Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-train-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install "dvc[azure]"

    - name: Pull Dataset from Azure via DVC
      run: |
        dvc remote modify --local myremote sas_token ${{ secrets.AZURE_SAS_TOKEN }}
        dvc pull

    - name: Extract Facial Embeddings
      run: |
        # Updated path to the new folder
        python model_testing/extract_embeddings.py

    - name: Run Evaluation
      run: |
        # Updated path to the new folder
        python model_testing/eval.py

    - name: Train Production Model
      run: |
        # Updated path to the new folder
        python model_testing/train_model.py

    - name: Upload Model Artifact
      uses: actions/upload-artifact@v4
      with:
        name: trained-face-model
        path: face_model.pkl

    # --- DOCKER STEPS ---
    - name: Login to Docker Hub
      if: github.event_name == 'push'
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and Push Docker Image
      if: github.event_name == 'push'
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/face-recognition:latest

    - name: Deploy to Azure VM
      if: github.event_name == 'push'
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.AZURE_HOST }}
        username: ${{ secrets.AZURE_USER }}
        key: ${{ secrets.AZURE_KEY }}
        script: |
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/face-recognition:latest
          docker stop face-api || true
          docker rm face-api || true
          docker run -d --name face-api -p 8000:8000 ${{ secrets.DOCKERHUB_USERNAME }}/face-recognition:latest